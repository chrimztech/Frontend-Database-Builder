<svg xmlns="http://www.w3.org/2000/svg" width="2480" height="3508" viewBox="0 0 2480 3508">
<defs>

  <!-- Cream paper gradient -->
  <linearGradient id="paper" x1="0" y1="0" x2="0" y2="3508" gradientUnits="userSpaceOnUse">
    <stop offset="0"   stop-color="#FAFCF6"/>
    <stop offset="0.5" stop-color="#F4F9EE"/>
    <stop offset="1"   stop-color="#ECF5E4"/>
  </linearGradient>

  <!-- Subtle vignette overlay -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="60%"  stop-color="#000000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.06"/>
  </radialGradient>

  <!-- Diagonal watermark: "The University of Zambia  TeLS" repeating -->
  <pattern id="wm" x="0" y="0" width="700" height="350"
    patternUnits="userSpaceOnUse" patternTransform="rotate(-28 1240 1754)">
    <text x="0"   y="65"
      font-family="Arial, Helvetica, sans-serif"
      font-size="40" font-weight="700" letter-spacing="3"
      fill="#1B5E20" fill-opacity="0.055">The University of Zambia</text>
    <text x="100" y="120"
      font-family="Arial, Helvetica, sans-serif"
      font-size="36" letter-spacing="8"
      fill="#1B5E20" fill-opacity="0.04">TeLS</text>
    <text x="0"   y="210"
      font-family="Arial, Helvetica, sans-serif"
      font-size="40" font-weight="700" letter-spacing="3"
      fill="#1B5E20" fill-opacity="0.055">The University of Zambia</text>
    <text x="100" y="265"
      font-family="Arial, Helvetica, sans-serif"
      font-size="36" letter-spacing="8"
      fill="#1B5E20" fill-opacity="0.04">TeLS</text>
  </pattern>

  <!-- Gold gradient for ornamental accents -->
  <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#B8860B"/>
    <stop offset="35%"  stop-color="#DAA520"/>
    <stop offset="65%"  stop-color="#DAA520"/>
    <stop offset="100%" stop-color="#B8860B"/>
  </linearGradient>

  <!-- Crest ring gradient -->
  <linearGradient id="crestRing" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%"   stop-color="#1B5E20"/>
    <stop offset="100%" stop-color="#2E7D32"/>
  </linearGradient>

</defs>

<!-- ═══════════════════════════════════════════════════════════
     BACKGROUND
═══════════════════════════════════════════════════════════ -->
<rect width="2480" height="3508" fill="url(#paper)"/>
<rect width="2480" height="3508" fill="url(#wm)"/>
<rect width="2480" height="3508" fill="url(#vignette)"/>

<!-- ═══════════════════════════════════════════════════════════
     BORDER SYSTEM  (matches physical certificate)
     Outer thin red → thick red → green → thin red inner
═══════════════════════════════════════════════════════════ -->
<!-- Outermost thin rule -->
<rect x="24"  y="24"  width="2432" height="3460"
  stroke="#8B0000" stroke-width="4" fill="none" stroke-opacity="0.5"/>
<!-- Primary thick red border -->
<rect x="44"  y="44"  width="2392" height="3420"
  stroke="#8B0000" stroke-width="22" fill="none"/>
<!-- Green inner border -->
<rect x="82"  y="82"  width="2316" height="3344"
  stroke="#1B5E20" stroke-width="10" fill="none"/>
<!-- Thin red inner accent -->
<rect x="110" y="110" width="2260" height="3288"
  stroke="#8B0000" stroke-width="3"  fill="none" stroke-opacity="0.45"/>

<!-- ═══════════════════════════════════════════════════════════
     CORNER ORNAMENTS — small filled triangular fillets
═══════════════════════════════════════════════════════════ -->
<polygon points="44,44  210,44  44,210"   fill="#1B5E20" fill-opacity="0.18"/>
<polygon points="2436,44  2270,44  2436,210" fill="#1B5E20" fill-opacity="0.18"/>
<polygon points="44,3464  210,3464  44,3298" fill="#1B5E20" fill-opacity="0.18"/>
<polygon points="2436,3464  2270,3464  2436,3298" fill="#1B5E20" fill-opacity="0.18"/>

<!-- Decorative corner crosses -->
<g fill="#DAA520" fill-opacity="0.55">
  <rect x="48"  y="180" width="30" height="6" rx="3"/>
  <rect x="180" y="48"  width="6"  height="30" rx="3"/>
  <rect x="2402" y="180" width="30" height="6" rx="3"/>
  <rect x="2294" y="48"  width="6"  height="30" rx="3"/>
  <rect x="48"   y="3322" width="30" height="6" rx="3"/>
  <rect x="180"  y="3430" width="6"  height="30" rx="3"/>
  <rect x="2402" y="3322" width="30" height="6" rx="3"/>
  <rect x="2294" y="3430" width="6"  height="30" rx="3"/>
</g>

<!-- ═══════════════════════════════════════════════════════════
     LOGO AREA — replaced by uploaded crest (Branding → UNZA crest / logo)
     Ring border kept as decorative frame; interior cleared for the real logo
═══════════════════════════════════════════════════════════ -->
<circle cx="1240" cy="426" r="228" fill="#FFFFFF" stroke="url(#crestRing)" stroke-width="16"/>
<circle cx="1240" cy="426" r="202" fill="#FFFFFF" stroke="#8B0000" stroke-width="5"/>
<circle cx="1240" cy="426" r="188" fill="#FAFCF8"/>

<!-- ═══════════════════════════════════════════════════════════
     INSTITUTION HEADER
═══════════════════════════════════════════════════════════ -->
<text x="1240" y="752"
  font-family="Arial, Helvetica, sans-serif"
  font-size="96" font-weight="900" letter-spacing="6"
  fill="#0D0D0D" text-anchor="middle">THE UNIVERSITY OF ZAMBIA</text>

<text x="1240" y="840"
  font-family="Arial, Helvetica, sans-serif"
  font-size="48" font-weight="700" letter-spacing="1"
  fill="#0D0D0D" text-anchor="middle">CENTRE FOR INFORMATION AND COMMUNICATION TECHNOLOGIES</text>

<!-- Gold ornamental separator -->
<rect x="560" y="866" width="1360" height="5" rx="2.5" fill="url(#gold)"/>

<text x="1240" y="940"
  font-family="Arial, Helvetica, sans-serif"
  font-size="60" font-weight="700" letter-spacing="5"
  fill="#1B5E20" text-anchor="middle">CONSULTANCY AND TRAINING UNIT</text>

<text x="1240" y="1010"
  font-family="Georgia, 'Times New Roman', serif"
  font-size="44" font-style="italic"
  fill="#555555" text-anchor="middle">Putting Quality First</text>

<!-- Section divider — double rule matching physical cert -->
<rect x="140" y="1056" width="2200" height="8"  rx="4" fill="#8B0000"/>
<rect x="140" y="1072" width="2200" height="3"  rx="1.5" fill="#1B5E20"/>

<!-- ═══════════════════════════════════════════════════════════
     CERTIFICATE TITLE
═══════════════════════════════════════════════════════════ -->
<text x="1240" y="1200"
  font-family="Arial, Helvetica, sans-serif"
  font-size="110" font-weight="900" letter-spacing="7"
  fill="#0D0D0D" text-anchor="middle">CERTIFICATE OF COMPETENCE</text>

<!-- ═══════════════════════════════════════════════════════════
     BODY — certify line
═══════════════════════════════════════════════════════════ -->
<text x="1240" y="1338"
  font-family="Georgia, 'Times New Roman', serif"
  font-size="64" font-style="italic"
  fill="#3A3A3A" text-anchor="middle">This is to certify that</text>

<!-- ═══════════════════════════════════════════════════════════
     DYNAMIC FIELDS — {{placeholder}} triggers detector
═══════════════════════════════════════════════════════════ -->

<!-- Recipient name -->
<text x="1240" y="1530"
  font-family="Georgia, 'Times New Roman', serif"
  font-size="118" font-style="italic" font-weight="700"
  fill="#0D0D0D" text-anchor="middle">{{full_name}}</text>
<!-- Underline rule -->
<rect x="280" y="1555" width="1920" height="3" rx="1.5" fill="#0D0D0D" fill-opacity="0.2"/>

<!-- NRC number -->
<text x="1240" y="1660"
  font-family="Arial, Helvetica, sans-serif"
  font-size="66" font-weight="700"
  fill="#0D0D0D" text-anchor="middle">NRC: {{nrc_number}}</text>

<!-- Course intro text -->
<text x="1240" y="1776"
  font-family="Georgia, 'Times New Roman', serif"
  font-size="58" font-style="italic"
  fill="#3A3A3A" text-anchor="middle">Completed training in the following course</text>

<!-- Programme / course name -->
<text x="1240" y="1940"
  font-family="Arial, Helvetica, sans-serif"
  font-size="94" font-weight="900" letter-spacing="4"
  fill="#8B0000" text-anchor="middle">{{programme}}</text>

<!-- Issue date -->
<text x="1240" y="2090"
  font-family="Georgia, 'Times New Roman', serif"
  font-size="64" font-style="italic"
  fill="#3A3A3A" text-anchor="middle">Date:  {{issue_date}}</text>

<!-- ═══════════════════════════════════════════════════════════
     SECTION RULE before signatures
═══════════════════════════════════════════════════════════ -->
<rect x="140" y="2158" width="2200" height="3"  rx="1.5" fill="#1B5E20"/>
<rect x="140" y="2168" width="2200" height="8"  rx="4"   fill="#8B0000"/>

<!-- ═══════════════════════════════════════════════════════════
     SIGNATURES
═══════════════════════════════════════════════════════════ -->
<!-- Left signatory -->
<text x="605" y="2452"
  font-family="Georgia, 'Times New Roman', serif"
  font-size="46" font-style="italic" fill="#444444" text-anchor="middle">{{signatory1_name}}</text>
<rect x="268" y="2510" width="672" height="4" rx="2" fill="#0D0D0D"/>
<text x="604" y="2578"
  font-family="Arial, Helvetica, sans-serif"
  font-size="50" font-weight="700"
  fill="#0D0D0D" text-anchor="middle">Director, CICT</text>

<!-- Right signatory -->
<text x="1876" y="2452"
  font-family="Georgia, 'Times New Roman', serif"
  font-size="46" font-style="italic" fill="#444444" text-anchor="middle">{{signatory2_name}}</text>
<rect x="1540" y="2510" width="672" height="4" rx="2" fill="#0D0D0D"/>
<text x="1876" y="2578"
  font-family="Arial, Helvetica, sans-serif"
  font-size="50" font-weight="700"
  fill="#0D0D0D" text-anchor="middle">Manager, CTU</text>

<!-- ═══════════════════════════════════════════════════════════
     QR CODE PLACEHOLDER (centred)
═══════════════════════════════════════════════════════════ -->
<rect x="1086" y="2648" width="308" height="308" rx="10"
  fill="#FFFFFF" stroke="#CCCCCC" stroke-width="4"/>
<!-- QR finder squares -->
<rect x="1100" y="2662" width="68" height="68" rx="3" fill="#222" fill-opacity="0.15"/>
<rect x="1326" y="2662" width="68" height="68" rx="3" fill="#222" fill-opacity="0.15"/>
<rect x="1100" y="2874" width="68" height="68" rx="3" fill="#222" fill-opacity="0.15"/>
<!-- Data area rows -->
<rect x="1188" y="2675" width="90"  height="9" rx="2" fill="#333" fill-opacity="0.1"/>
<rect x="1188" y="2703" width="130" height="9" rx="2" fill="#333" fill-opacity="0.1"/>
<rect x="1188" y="2731" width="75"  height="9" rx="2" fill="#333" fill-opacity="0.1"/>
<rect x="1188" y="2759" width="110" height="9" rx="2" fill="#333" fill-opacity="0.1"/>
<rect x="1100" y="2788" width="278" height="9" rx="2" fill="#333" fill-opacity="0.09"/>
<rect x="1100" y="2816" width="190" height="9" rx="2" fill="#333" fill-opacity="0.09"/>
<rect x="1100" y="2844" width="150" height="9" rx="2" fill="#333" fill-opacity="0.09"/>

<text x="1240" y="2998"
  font-family="Arial, Helvetica, sans-serif"
  font-size="33" fill="#666666" text-anchor="middle">Verify at tels.unza.zm/verify</text>

<!-- ═══════════════════════════════════════════════════════════
     CERTIFICATE CODE — bottom right
═══════════════════════════════════════════════════════════ -->
<text x="2230" y="3048"
  font-family="'Courier New', Courier, monospace"
  font-size="50" font-weight="700" letter-spacing="4"
  fill="#0D0D0D" text-anchor="end">{{certificate_id}}</text>

<!-- Bottom gold rule above code -->
<rect x="140" y="3070" width="2200" height="3" rx="1.5" fill="url(#gold)" fill-opacity="0.5"/>

</svg>
