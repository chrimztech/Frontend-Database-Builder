# /etc/nginx/sites-available/cemis.unza.ac.zm
# Serves the frontend (Node/TanStack Start on 127.0.0.1:4000) and reverse-proxies
# /api to the Spring Boot backend (127.0.0.1:8080).
#
# Install:
#   sudo cp nginx-cemis.conf /etc/nginx/sites-available/cemis.unza.ac.zm
#   sudo ln -s /etc/nginx/sites-available/cemis.unza.ac.zm /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# 192.168.99.120 is a private address, so this domain is presumably internal-only.
# For TLS, either issue an internal CA certificate or run
# `sudo certbot --nginx -d cemis.unza.ac.zm` if the box is actually reachable from
# the public internet for the ACME HTTP-01 challenge — skip that if it's not.

server {
    listen 80;
    listen [::]:80;
    server_name cemis.unza.ac.zm;

    # Generated certificate PDFs embed the full-resolution branding background
    # image — keep this in sync with UPLOAD_MAX_SIZE in backend.env.
    client_max_body_size 25M;

    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:4000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
